<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>球球大作战 - 极速版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: "Microsoft YaHei", -apple-system, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
        }
        
        /* 通用界面样式 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }

        #start-screen {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%);
        }

        .menu-content {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #3498db;
            text-align: center;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.3);
            transform: rotate(-90deg);
        }

        #game-over .menu-content {
            transform: rotate(-90deg) translateY(50%);
        }

        input {
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
            width: 200px;
            text-align: center;
            outline: none;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .btn:active {
            transform: scale(0.95);
            background: #2980b9;
        }

        #ui {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%) rotate(-90deg);
            color: #f1c40f; /* 醒目的金黄色 */
            font-size: 24px; /* 加大字号 */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 50;
        }

        /* 摇杆固定在右下角 (等距) */
        #joystick-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 60;
            display: block; /* 始终显示 */
        }
        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: rgba(52, 152, 219, 0.5);
            border: 2px solid #3498db;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* 加速按钮固定在右上角 (等距) */
        #boost-btn {
            position: fixed;
            top: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: rgba(241, 196, 15, 0.3);
            border: 3px solid #f1c40f;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60;
            color: #f1c40f;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.1s;
        }
        #boost-btn:active {
            background: rgba(241, 196, 15, 0.6);
            transform: scale(0.9);
        }

        #game-over {
            display: none;
        }
    </style>
</head>
<body>
    <div id="start-screen" class="overlay">
        <div class="menu-content">
            <h1 style="color: #3498db; margin-top: 0;">球球大作战</h1>
            <input type="text" id="player-name" placeholder="请输入你的昵称" maxlength="8">
            <br>
            <button id="start-btn" class="btn">进入游戏</button>
        </div>
    </div>

    <div id="ui" style="display: none;">
        质量: <span id="score">0</span>
    </div>
    
    <div id="joystick-container" style="display: none;">
        <div id="joystick-knob"></div>
    </div>

    <div id="boost-btn" style="display: none;">⚡</div>
    
    <div id="game-over" class="overlay">
        <div class="menu-content">
            <h1 style="color: #e74c3c;">游戏结束</h1>
            <p>你的最终质量: <span id="final-score">0</span></p>
            <button id="restart-btn" class="btn">重新开始</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const playerNameInput = document.getElementById('player-name');
        const joystickContainer = document.getElementById('joystick-container');
        const joystickKnob = document.getElementById('joystick-knob');
        const boostBtn = document.getElementById('boost-btn');
        const uiContainer = document.getElementById('ui');

        // 游戏配置
        const WORLD_SIZE = 4000;
        const FOOD_COUNT = 400;
        const AI_COUNT = 20;
        const COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#1abc9c', '#e67e22', '#f39c12'];
        
        let width, height;
        let player, foods, ais;
        let isGameOver = false;
        let isStarted = false;
        let cameraX = 0, cameraY = 0;
        let scale = 1;

        // 摇杆控制变量
        let joystickActive = false;
        let moveX = 0;
        let moveY = 0; 
        const JOYSTICK_MAX_RADIUS = 60;

        // 加速逻辑
        let isBoosting = false;

        class Ball {
            constructor(x, y, radius, color, name = '') {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.name = name;
                this.vx = 0;
                this.vy = 0;
                this.mass = Math.PI * radius * radius;
                this.updateMass();
            }

            updateMass() {
                this.radius = Math.sqrt(this.mass / Math.PI);
                this.radiusSquared = this.radius * this.radius;
            }

            draw() {
                const screenX = (this.x - cameraX) * scale + width / 2;
                const screenY = (this.y - cameraY) * scale + height / 2;
                const screenRadius = this.radius * scale;

                if (screenX + screenRadius < -10 || screenX - screenRadius > width + 10 ||
                    screenY + screenRadius < -10 || screenY - screenRadius > height + 10) return;

                ctx.save();
                ctx.shadowBlur = 15 * scale;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, screenRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
                
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = Math.max(1, 2 * scale);
                ctx.stroke();

                if (this.name) {
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    const fontSize = Math.max(12, screenRadius * 0.35);
                    ctx.font = `bold ${fontSize}px "Microsoft YaHei"`;
                    ctx.fillText(this.name, screenX, screenY + fontSize * 0.35);
                }
            }
        }

        function init() {
            resize();
            isGameOver = false;
            isStarted = true;
            startScreen.style.display = 'none';
            gameOverEl.style.display = 'none';
            uiContainer.style.display = 'block';
            joystickContainer.style.display = 'block';
            boostBtn.style.display = 'flex';
            
            const pName = playerNameInput.value || '无名小球';
            player = new Ball(WORLD_SIZE / 2, WORLD_SIZE / 2, 25, '#3498db', pName);
            
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) spawnFood();

            ais = [];
            for (let i = 0; i < AI_COUNT; i++) spawnAI();

            cameraX = player.x;
            cameraY = player.y;
            
            if (!animationFrameId) animationFrameId = requestAnimationFrame(gameLoop);
        }

        let animationFrameId = null;

        function spawnFood() {
            const r = 5 + Math.random() * 3;
            foods.push({
                x: Math.random() * WORLD_SIZE,
                y: Math.random() * WORLD_SIZE,
                radius: r,
                radiusSquared: r * r,
                color: COLORS[Math.floor(Math.random() * COLORS.length)]
            });
        }

        function spawnAI() {
            const names = ['球王', '无敌', '小可爱', '吞噬者', '萌萌哒', '霸主', '闪电', '飓风', '猎手', '幻影'];
            const radius = 20 + Math.random() * 30;
            const name = names[Math.floor(Math.random() * names.length)] + (Math.floor(Math.random()*900) + 100);
            const ai = new Ball(Math.random() * WORLD_SIZE, Math.random() * WORLD_SIZE, radius, COLORS[Math.floor(Math.random() * COLORS.length)], name);
            ais.push(ai);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function gameLoop() {
            if (!isStarted || isGameOver) {
                animationFrameId = null;
                return;
            }
            update();
            draw();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function update() {
            let speedMultiplier = 1;
            if (isBoosting && player.mass > 500) {
                speedMultiplier = 1.8;
                player.mass -= 2;
                player.updateMass();
            }

            if (joystickActive) {
                const baseSpeed = Math.max(1.2, 6 - (player.radius / 120));
                player.vx = moveX * baseSpeed * speedMultiplier;
                player.vy = moveY * baseSpeed * speedMultiplier;
            } else {
                player.vx *= 0.94;
                player.vy *= 0.94;
            }

            player.x += player.vx;
            player.y += player.vy;
            player.x = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.y));

            cameraX += (player.x - cameraX) * 0.1;
            cameraY += (player.y - cameraY) * 0.1;
            const targetScale = Math.max(0.2, 1.2 / (1 + (player.radius - 25) / 250));
            scale += (targetScale - scale) * 0.03;

            for (let ai of ais) {
                let target = null;
                let minDist = Infinity;
                const senseRange = 600;

                const distToPlayer = Math.hypot(ai.x - player.x, ai.y - player.y);
                if (distToPlayer < senseRange && player.radius > ai.radius * 1.1) {
                    ai.targetAngle = Math.atan2(ai.y - player.y, ai.x - player.x);
                } else if (Math.random() < 0.02) {
                    ai.targetAngle = Math.random() * Math.PI * 2;
                }

                if (ai.targetAngle === undefined) ai.targetAngle = Math.random() * Math.PI * 2;
                
                const aiSpeed = Math.max(0.8, 4.5 - (ai.radius / 120));
                ai.x += Math.cos(ai.targetAngle) * aiSpeed;
                ai.y += Math.sin(ai.targetAngle) * aiSpeed;

                ai.x = Math.max(ai.radius, Math.min(WORLD_SIZE - ai.radius, ai.x));
                ai.y = Math.max(ai.radius, Math.min(WORLD_SIZE - ai.radius, ai.y));
            }

            checkCollisions();
            scoreEl.innerText = Math.floor(player.mass / 10);
        }

        function checkCollisions() {
            for (let i = foods.length - 1; i >= 0; i--) {
                const f = foods[i];
                if (Math.hypot(player.x - f.x, player.y - f.y) < player.radius) {
                    player.mass += f.radius * 2;
                    player.updateMass();
                    foods.splice(i, 1);
                    spawnFood();
                    continue;
                }
                for (let ai of ais) {
                    if (Math.hypot(ai.x - f.x, ai.y - f.y) < ai.radius) {
                        ai.mass += f.radius * 2;
                        ai.updateMass();
                        foods.splice(i, 1);
                        spawnFood();
                        break;
                    }
                }
            }

            for (let i = ais.length - 1; i >= 0; i--) {
                const ai = ais[i];
                const dist = Math.hypot(player.x - ai.x, player.y - ai.y);
                
                if (dist < Math.max(player.radius, ai.radius)) {
                    if (player.radius > ai.radius * 1.1) {
                        player.mass += ai.mass * 0.8;
                        player.updateMass();
                        ais.splice(i, 1);
                        spawnAI();
                    } else if (ai.radius > player.radius * 1.1) {
                        gameOver();
                    }
                }
            }

            for (let i = 0; i < ais.length; i++) {
                for (let j = i + 1; j < ais.length; j++) {
                    const a = ais[i];
                    const b = ais[j];
                    const d = Math.hypot(a.x - b.x, a.y - b.y);
                    if (d < Math.max(a.radius, b.radius)) {
                        if (a.radius > b.radius * 1.1) {
                            a.mass += b.mass * 0.8; a.updateMass();
                            ais.splice(j, 1); spawnAI();
                        } else if (b.radius > a.radius * 1.1) {
                            b.mass += a.mass * 0.8; b.updateMass();
                            ais.splice(i, 1); spawnAI();
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            const gridSize = 100 * scale;
            const startX = ((-cameraX * scale + width / 2) % gridSize + gridSize) % gridSize;
            const startY = ((-cameraY * scale + height / 2) % gridSize + gridSize) % gridSize;
            ctx.beginPath();
            for (let x = startX; x < width; x += gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for (let y = startY; y < height; y += gridSize) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();

            const bL = (0 - cameraX) * scale + width / 2;
            const bT = (0 - cameraY) * scale + height / 2;
            const bS = WORLD_SIZE * scale;
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 5;
            ctx.strokeRect(bL, bT, bS, bS);

            for (let f of foods) {
                const sx = (f.x - cameraX) * scale + width / 2;
                const sy = (f.y - cameraY) * scale + height / 2;
                const sr = f.radius * scale;
                if (sx + sr < 0 || sx - sr > width || sy + sr < 0 || sy - sr > height) continue;
                ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fillStyle = f.color; ctx.fill();
            }

            for (let ai of ais) ai.draw();
            player.draw();
        }

        function gameOver() {
            isGameOver = true;
            finalScoreEl.innerText = Math.floor(player.mass / 10);
            gameOverEl.style.display = 'flex';
            uiContainer.style.display = 'none';
            joystickContainer.style.display = 'none';
            boostBtn.style.display = 'none';
        }

        function updateJoystick(x, y) {
            const rect = joystickContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = x - centerX;
            let dy = y - centerY;
            const dist = Math.hypot(dx, dy);
            
            if (dist > JOYSTICK_MAX_RADIUS) {
                dx = (dx / dist) * JOYSTICK_MAX_RADIUS;
                dy = (dy / dist) * JOYSTICK_MAX_RADIUS;
            }
            
            joystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            moveX = dx / JOYSTICK_MAX_RADIUS;
            moveY = dy / JOYSTICK_MAX_RADIUS;
        }

        window.addEventListener('resize', resize);
        
        joystickContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            joystickActive = true;
            updateJoystick(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (joystickActive) {
                for (let touch of e.touches) {
                    if (touch.clientX > width / 2) {
                        updateJoystick(touch.clientX, touch.clientY);
                        break;
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (e.touches.length === 0 || Array.from(e.touches).every(t => t.clientX < width / 2)) {
                joystickActive = false;
                joystickKnob.style.transform = 'translate(-50%, -50%)';
                moveX = 0; moveY = 0;
            }
        });

        boostBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isBoosting = true;
        }, { passive: false });
        window.addEventListener('touchend', (e) => {
            if (Array.from(e.touches).every(t => t.clientX > width / 2)) {
                isBoosting = false;
            }
        });

        startBtn.addEventListener('click', init);
        restartBtn.addEventListener('click', init);

        resize();
    </script>
</body>
</html>
