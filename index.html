<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>球球大作战 - 极速版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 2px solid #3498db;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
            z-index: 100;
        }
        #game-over h1 {
            margin: 0 0 20px 0;
            color: #e74c3c;
        }
        #game-over p {
            font-size: 20px;
            margin: 10px 0 25px 0;
        }
        #restart-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #restart-btn:active {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div id="ui">得分: <span id="score">0</span></div>
    
    <div id="game-over">
        <h1>游戏结束</h1>
        <p>你的最终质量: <span id="final-score">0</span></p>
        <button id="restart-btn">重新开始</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        // 游戏配置
        const WORLD_SIZE = 3000;
        const FOOD_COUNT = 300;
        const AI_COUNT = 15;
        const COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#1abc9c', '#e67e22', '#f39c12'];
        
        let width, height;
        let player, foods, ais;
        let isGameOver = false;
        let touchX = null, touchY = null;
        let cameraX = 0, cameraY = 0;
        let scale = 1;

        class Ball {
            constructor(x, y, radius, color, name = '') {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.name = name;
                this.vx = 0;
                this.vy = 0;
                this.mass = Math.PI * radius * radius;
            }

            updateMass() {
                this.radius = Math.sqrt(this.mass / Math.PI);
                this.radiusSquared = this.radius * this.radius;
            }

            draw() {
                // 转换坐标到屏幕
                const screenX = (this.x - cameraX) * scale + width / 2;
                const screenY = (this.y - cameraY) * scale + height / 2;
                const screenRadius = this.radius * scale;

                // 视口剪裁 (Viewport Culling)
                if (screenX + screenRadius < -10 || screenX - screenRadius > width + 10 ||
                    screenY + screenRadius < -10 || screenY - screenRadius > height + 10) return;

                ctx.beginPath();
                ctx.arc(screenX, screenY, screenRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // 绘制描边
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = Math.max(1, 2 * scale);
                ctx.stroke();

                // 绘制名字
                if (this.name) {
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    const fontSize = Math.max(10, screenRadius * 0.4);
                    if (fontSize > 6) {
                        ctx.font = `bold ${fontSize}px Arial`;
                        ctx.fillText(this.name, screenX, screenY + fontSize * 0.35);
                    }
                }
            }
        }

        function init() {
            resize();
            isGameOver = false;
            gameOverEl.style.display = 'none';
            
            // 初始化玩家
            player = new Ball(WORLD_SIZE / 2, WORLD_SIZE / 2, 20, '#3498db', '我');
            player.updateMass();
            
            // 初始化食物
            foods = [];
            for (let i = 0; i < FOOD_COUNT; i++) {
                spawnFood();
            }

            // 初始化 AI
            ais = [];
            for (let i = 0; i < AI_COUNT; i++) {
                spawnAI();
            }

            cameraX = player.x;
            cameraY = player.y;
            scoreEl.innerText = Math.floor(player.radius);
            
            if (!animationFrameId) {
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        }

        let animationFrameId = null;

        function spawnFood() {
            const r = 4 + Math.random() * 2;
            foods.push({
                x: Math.random() * WORLD_SIZE,
                y: Math.random() * WORLD_SIZE,
                radius: r,
                radiusSquared: r * r,
                color: COLORS[Math.floor(Math.random() * COLORS.length)]
            });
        }

        function spawnAI() {
            const names = ['球王', '无敌', '小可爱', '吞噬者', '萌萌哒', '霸主', '闪电', '飓风'];
            const x = Math.random() * WORLD_SIZE;
            const y = Math.random() * WORLD_SIZE;
            const radius = 15 + Math.random() * 20;
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            const name = names[Math.floor(Math.random() * names.length)] + (Math.floor(Math.random()*900) + 100);
            const ball = new Ball(x, y, radius, color, name);
            ball.updateMass();
            ais.push(ball);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function gameLoop() {
            if (isGameOver) {
                animationFrameId = null;
                return;
            }

            update();
            draw();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function update() {
            // 玩家移动逻辑 - 零延迟响应
            if (touchX !== null && touchY !== null) {
                const dx = touchX - width / 2;
                const dy = touchY - height / 2;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 5) {
                    const angle = Math.atan2(dy, dx);
                    const speed = Math.max(1.5, 5 - (player.radius / 150)); // 基础速度提高
                    
                    player.vx = Math.cos(angle) * speed;
                    player.vy = Math.sin(angle) * speed;
                }
            } else {
                player.vx *= 0.92;
                player.vy *= 0.92;
            }

            player.x += player.vx;
            player.y += player.vy;

            // 边界检查
            player.x = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(WORLD_SIZE - player.radius, player.y));

            // 相机平滑跟随
            cameraX += (player.x - cameraX) * 0.15;
            cameraY += (player.y - cameraY) * 0.15;

            // 动态缩放 (体型越大视野越广)
            const targetScale = Math.max(0.35, 1 / (1 + (player.radius - 20) / 400));
            scale += (targetScale - scale) * 0.05;

            // AI 移动逻辑
            for (let i = 0; i < ais.length; i++) {
                const ai = ais[i];
                if (Math.random() < 0.015) {
                    ai.targetAngle = Math.random() * Math.PI * 2;
                }
                if (ai.targetAngle === undefined) ai.targetAngle = Math.random() * Math.PI * 2;
                
                const speed = Math.max(0.8, 4 - (ai.radius / 150));
                ai.vx = Math.cos(ai.targetAngle) * speed;
                ai.vy = Math.sin(ai.targetAngle) * speed;
                
                ai.x += ai.vx;
                ai.y += ai.vy;

                if (ai.x < ai.radius || ai.x > WORLD_SIZE - ai.radius) ai.targetAngle = Math.PI - ai.targetAngle;
                if (ai.y < ai.radius || ai.y > WORLD_SIZE - ai.radius) ai.targetAngle = -ai.targetAngle;
                
                ai.x = Math.max(ai.radius, Math.min(WORLD_SIZE - ai.radius, ai.x));
                ai.y = Math.max(ai.radius, Math.min(WORLD_SIZE - ai.radius, ai.y));
            }

            // 碰撞检测优化: 使用平方距离
            // 1. 食物碰撞
            for (let i = foods.length - 1; i >= 0; i--) {
                const f = foods[i];
                
                // 玩家吃食物
                const dxP = player.x - f.x;
                const dyP = player.y - f.y;
                if (dxP*dxP + dyP*dyP < player.radiusSquared) {
                    player.mass += Math.PI * f.radiusSquared;
                    player.updateMass();
                    foods.splice(i, 1);
                    spawnFood();
                    scoreEl.innerText = Math.floor(player.radius);
                    continue;
                }
                
                // AI 吃食物
                for (let j = 0; j < ais.length; j++) {
                    const ai = ais[j];
                    const dxA = ai.x - f.x;
                    const dyA = ai.y - f.y;
                    if (dxA*dxA + dyA*dyA < ai.radiusSquared) {
                        ai.mass += Math.PI * f.radiusSquared;
                        ai.updateMass();
                        foods.splice(i, 1);
                        spawnFood();
                        break;
                    }
                }
            }

            // 2. 吞噬碰撞
            // 玩家与 AI
            for (let i = ais.length - 1; i >= 0; i--) {
                const ai = ais[i];
                const dx = player.x - ai.x;
                const dy = player.y - ai.y;
                const distSq = dx * dx + dy * dy;
                
                if (distSq < player.radiusSquared || distSq < ai.radiusSquared) {
                    if (player.radius > ai.radius * 1.1) {
                        player.mass += ai.mass;
                        player.updateMass();
                        ais.splice(i, 1);
                        spawnAI();
                        scoreEl.innerText = Math.floor(player.radius);
                    } else if (ai.radius > player.radius * 1.1) {
                        gameOver();
                    }
                }
            }

            // AI 之间互相吞噬
            for (let i = 0; i < ais.length; i++) {
                for (let j = i + 1; j < ais.length; j++) {
                    const a = ais[i];
                    const b = ais[j];
                    const dx = a.x - b.x;
                    const dy = a.y - b.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < a.radiusSquared || distSq < b.radiusSquared) {
                        if (a.radius > b.radius * 1.1) {
                            a.mass += b.mass;
                            a.updateMass();
                            ais.splice(j, 1);
                            spawnAI();
                        } else if (b.radius > a.radius * 1.1) {
                            b.mass += a.mass;
                            b.updateMass();
                            ais.splice(i, 1);
                            spawnAI();
                        }
                    }
                }
            }
        }

        function draw() {
            // 清屏
            ctx.fillStyle = '#111'; // 更深的背景
            ctx.fillRect(0, 0, width, height);

            // 绘制网格线
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            const gridSize = 100 * scale;
            const startX = ((-cameraX * scale + width / 2) % gridSize + gridSize) % gridSize;
            const startY = ((-cameraY * scale + height / 2) % gridSize + gridSize) % gridSize;

            ctx.beginPath();
            for (let x = startX; x < width; x += gridSize) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
            }
            for (let y = startY; y < height; y += gridSize) {
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
            }
            ctx.stroke();

            // 绘制世界边界
            const borderLeft = (0 - cameraX) * scale + width / 2;
            const borderTop = (0 - cameraY) * scale + height / 2;
            const borderSize = WORLD_SIZE * scale;
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 3;
            ctx.strokeRect(borderLeft, borderTop, borderSize, borderSize);

            // 绘制食物
            for (let i = 0; i < foods.length; i++) {
                const f = foods[i];
                const screenX = (f.x - cameraX) * scale + width / 2;
                const screenY = (f.y - cameraY) * scale + height / 2;
                const r = f.radius * scale;
                if (screenX + r < 0 || screenX - r > width || screenY + r < 0 || screenY - r > height) continue;
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, r, 0, Math.PI * 2);
                ctx.fillStyle = f.color;
                ctx.fill();
            }

            // 绘制 AI
            for (let i = 0; i < ais.length; i++) ais[i].draw();

            // 绘制玩家
            player.draw();
        }

        function gameOver() {
            isGameOver = true;
            finalScoreEl.innerText = Math.floor(player.radius);
            gameOverEl.style.display = 'block';
        }

        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            touchX = null;
            touchY = null;
        });

        // 鼠标测试支持
        canvas.addEventListener('mousedown', (e) => {
            touchX = e.clientX;
            touchY = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            if (touchX !== null) {
                touchX = e.clientX;
                touchY = e.clientY;
            }
        });
        window.addEventListener('mouseup', () => {
            touchX = null;
            touchY = null;
        });

        restartBtn.addEventListener('click', init);

        // 启动
        init();
    </script>
</body>
</html>
